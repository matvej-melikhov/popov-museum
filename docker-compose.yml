services:
  web:
    image: ghcr.io/matvej-melikhov/popov-museum:latest
    restart: unless-stopped
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
